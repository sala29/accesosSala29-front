<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala 29 · Mi QR de Acceso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="qr.css">
</head>
<body>
    <div class="app" style="padding-top: 15px;"> <section class="screen active" style="gap: 10px;"> <button class="secondary btn-volver" id="volverInicioPerfil" style="margin-bottom: 0;">⬅ Volver</button>
            
            <div class="perfil-container" style="align-items: center; padding-top: 25px;">
                <div class="qr-campo" style="width: 100%;">
                    <span class="label" id="nombreUsuario" style="font-size: 1.3rem; margin-bottom: 5px; text-align: center; color: #fff;">Cargando...</span>
                    <span class="label" style="font-weight: normal; margin-bottom: 15px;">Socio Sala 29</span>
                    
                    <div id="qrCodeWrapper" style="display: flex; justify-content: center; align-items: center; min-height: 340px; width: 100%;">
                        <span id="qrLoading" class="qr-loading-text">Cargando QR...</span>
                        
                        <img id="qrCodeImg" src="" alt="QR" style="display: none; width: 340px; height: 340px; max-width: 100%; object-fit: contain;">
                    </div>
                </div>
                
                <div class="editar-btns" style="justify-content: center; gap: 15px; margin-top: 30px; width: 100%;">
                    <button class="secondary" id="btnCopyQR">📋 Copiar</button>
                    <button class="primary" id="btnDownloadQR">⬇️ Descargar</button>
                </div>
            </div>
        </section>
    </div>
    <script src="qr.js"></script>
</body>
</html>
