<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Evento - SALA 29</title>
    <link rel="stylesheet" href="eventos.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="loading-state" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="loader-spinner"></div>
    </div>

    <main id="event-content" style="display: none;">
        <header class="header">
            <span class="header-logo">🎵 SALA 29</span>
        </header>

        <div class="detail-container fade-in">
            <button class="detail-back" onclick="window.history.back()">← Volver</button>

            <div id="event-image-container"></div>

            <h1 id="event-title" class="detail-title"></h1>
            <p id="event-date" class="detail-date"></p>
            <p id="event-price" class="detail-price"></p>
            <p id="event-desc" class="detail-desc"></p>

            <div id="action-container" style="margin-top: 24px;"></div>
        </div>
    </main>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-box fade-in">
            <h3 style="color: #2aa3ff; margin-top: 0; font-size: 1.4rem;">Confirmar asistencia</h3>
            <p id="confirm-text" style="color: #e0e0e0; line-height: 1.5; font-size: 1rem;"></p>
            
            <div style="display: flex; gap: 12px; margin-top: 25px;">
                <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancelar</button>
                <button class="btn btn-primary" id="btn-confirm-signup" style="flex: 1;">Sí, apuntarme</button>
            </div>
        </div>
    </div>

    <script src="detalle.js"></script>
</body>
</html>
