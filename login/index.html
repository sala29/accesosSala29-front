<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala 29 · Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="app">
    <section id="screenLogin" class="screen active">
        <h1 class="logo">SALA 29</h1>
        <h2>Acceder a mi perfil</h2>
        <p class="login-info">
            Identifícate con tu <strong>DNI</strong> y <strong>alguno</strong> de los siguientes datos.
        </p>
        
        <input type="text" id="loginDni" placeholder="DNI *">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="tel" id="loginTelefono" placeholder="Teléfono">
        
        <label class="input-label">Fecha de nacimiento</label>
        <div class="fecha-custom-wrapper">
            <input type="text" id="loginDia" class="fecha-seg" placeholder="DD" maxlength="2" inputmode="numeric">
            <span class="fecha-sep">/</span>
            <input type="text" id="loginMes" class="fecha-seg" placeholder="MM" maxlength="2" inputmode="numeric">
            <span class="fecha-sep">/</span>
            <input type="text" id="loginAnio" class="fecha-seg" placeholder="AAAA" maxlength="4" inputmode="numeric">
        </div>
    </section>
</div>

<div id="modalNoSocio" class="modal-overlay" role="dialog">
    <div class="modal-box" style="text-align: center; padding: 40px 25px;">
        <button id="btnCerrarModalX" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #666; font-size: 24px; cursor: pointer;">&times;</button>
        
        <div style="width: 64px; height: 64px; background: rgba(42,163,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; border: 1px solid rgba(42,163,255,0.2);">
            <span style="font-size: 1.6rem; color: #2aa3ff;">👤</span>
        </div>

        <h2 style="margin: 0 0 12px 0; color: #fff;">No te encontramos</h2>
        <p style="color: #a5b4c4; margin-bottom: 30px;">
            Parece que aún no formas parte de <strong>Sala 29</strong>.
        </p>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="primary" id="btnGoRegistro" style="width: 100%;">Registrarse ahora</button>
            <button class="secondary" id="btnCerrarModal" style="width: 100%;">Intentarlo de nuevo</button>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
