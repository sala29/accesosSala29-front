<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala 29 · Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="app">
    <section id="screenLogin" class="screen active">
        <h1 class="logo">SALA 29</h1>
        <h2>Acceder a mi perfil</h2>
        <p class="login-info">
            Identifícate con tu DNI y uno de los siguientes datos para verificar tu identidad.
        </p>
        
        <div class="login-form" style="display: flex; flex-direction: column; gap: 20px;">
            <input type="text" id="loginDni" placeholder="DNI *">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="tel" id="loginTelefono" placeholder="Teléfono">
            <input type="date" id="loginFecha" placeholder="dd/mm/aaaa">
            
            <button class="primary" id="btnLoginPerfil">Iniciar sesión</button>
            <button class="secondary" id="btnVolver">Volver</button>
        </div>

        <div id="mensajeLogin" class="mensaje"></div>
    </section>
</div>

<div id="modalNoSocio" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <div class="modal-icon" style="font-size: 3rem; margin-bottom: 10px;">👋</div>
        <h2 class="modal-title" style="margin-bottom: 15px;">¡Hola!</h2>
        <p style="color: #a5b4c4; line-height: 1.5; margin-bottom: 25px;">
            Parece que aún no constas como socio en <strong>Sala 29</strong>. <br><br>
            ¿Te gustaría darte de alta ahora o prefieres revisar los datos?
        </p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="primary" id="btnGoRegistro">Registrarme ahora</button>
            <button class="secondary" id="btnCerrarModal">Revisar mis datos</button>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
